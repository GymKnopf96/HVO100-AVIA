<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>HVO100 – AVIA: Validierte Distanzen</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  html, body { height:100%; margin:0; }
  #map { height:100%; }
  .toolbar {
    position:absolute; top:10px; right:10px; z-index:1000;
    display:flex; gap:8px; flex-wrap:wrap;
  }
  .btn {
    background:#fff; border:1px solid #d0d7de; border-radius:8px;
    padding:8px 10px; cursor:pointer;
    font:14px/1 system-ui,Segoe UI,Roboto,Arial;
    box-shadow:0 1px 4px rgba(0,0,0,.08)
  }
  .btn:hover { background:#f6f8fa; }
</style>
</head>

<body>
<div id="map"></div>

<div class="toolbar">
  <button id="fitBtn" class="btn">Alle anzeigen</button>
  <button id="fsBtn" class="btn">Vollbild (F)</button>
  <button id="loadBtn" class="btn">HUB/VZ laden & validieren</button>
</div>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<!-- Unsere komplette Kartenlogik -->
<script src="logic.js"></script>

</body>
</html>
